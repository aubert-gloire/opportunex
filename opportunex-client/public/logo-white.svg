<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 64" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital@1&amp;family=Inter:wght@400;500&amp;display=swap');
    </style>
  </defs>

  <!-- ── Mark: circle + inscribed X (white) ── -->
  <circle cx="32" cy="32" r="27" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="12.9" y1="12.9" x2="51.1" y2="51.1" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="51.1" y1="12.9" x2="12.9" y2="51.1" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ── Thin vertical separator ── -->
  <line x1="74" y1="14" x2="74" y2="50" stroke="rgba(255,255,255,0.25)" stroke-width="0.75"/>

  <!-- ── Wordmark (white) ── -->
  <text
    x="86"
    y="40"
    font-family="'EB Garamond', Georgia, 'Times New Roman', serif"
    font-style="italic"
    font-weight="400"
    font-size="30"
    fill="#FFFFFF"
    letter-spacing="-0.4"
  >Opportune<tspan
      font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
      font-style="normal"
      font-weight="500"
      font-size="30"
      letter-spacing="0"
    >X</tspan></text>

  <!-- ── Sub-label ── -->
  <text
    x="87"
    y="55"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-weight="400"
    font-size="7.5"
    fill="rgba(255,255,255,0.5)"
    letter-spacing="2.5"
  >CAREERS PLATFORM · RWANDA</text>
</svg>
